name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  AWS_REGION: us-east-1
  EC2_INSTANCE_IP: ${{ secrets.EC2_INSTANCE_IP }}
  EC2_INSTANCE_USER: ${{ secrets.EC2_INSTANCE_USER }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Install backend dependencies
      working-directory: backend
      run: npm install

    - name: Run backend tests
      working-directory: backend
      run: npm test --if-present

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm install

    - name: Run frontend tests
      working-directory: frontend
      run: npm test --if-present

    - name: Build frontend
      working-directory: frontend
      run: npm run build --if-present

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ env.EC2_INSTANCE_IP }} >> ~/.ssh/known_hosts
    
    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/id_rsa ${{ env.EC2_INSTANCE_USER }}@${{ env.EC2_INSTANCE_IP }} << 'EOF'
        set -e
        
        # Navigate to project directory
        cd /home/${{ env.EC2_INSTANCE_USER }}/ProductManagement
        
        # Pull latest code
        git pull origin main
        
        # Stop existing containers
        docker-compose down || true
        
        # Start new containers
        docker-compose up -d
        
        # Verify deployment
        sleep 15
        docker-compose ps
        
        # Health checks
        echo "Checking Backend Health..."
        curl -f http://localhost:5000/health || (echo "Backend health check failed" && exit 1)
        
        echo "Checking Frontend..."
        curl -f http://localhost:80 || (echo "Frontend health check failed" && exit 1)
        
        echo "Deployment successful!"
        EOF
    
    - name: Cleanup SSH Key
      if: always()
      run: rm -f ~/.ssh/id_rsa