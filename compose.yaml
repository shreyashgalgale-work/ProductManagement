services:
    redis:
        image: redis:latest
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        networks:
            - backend

    server:
        build: ./backend
        container_name: server
        ports:
            - "5000:5000"
        volumes:
            - server-data:/app/data
        env_file: ./backend/.env
        depends_on:
            - redis
        networks:
            - backend
            - frontend

    client:
        build: ./frontend
        container_name: client
        ports:
            - "3000:3000"
        stdin_open: true
        tty: true
        networks:
            - frontend

volumes:
    server-data:
    redis-data:

networks:
    backend:
        driver: bridge
    frontend:
        driver: bridge
